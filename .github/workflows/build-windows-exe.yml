name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build SolarHermes.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: >
          pyinstaller
          --noconfirm
          --onefile
          --windowed
          --name SolarHermes
          windows/solar_hermes_launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SolarHermes-Windows
          path: dist/SolarHermes.exe

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SolarHermes.exe
          generate_release_notes: true
